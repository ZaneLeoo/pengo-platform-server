openapi: 3.0.3
info:
  title: RuoYi Agent - 物料查询工具
  version: 1.0.0
  description: 查询 MES 物料主数据，只读工具，最多返回 50 条。
servers:
  - url: http://host.docker.internal:8088
paths:
  /agent/tools/materials/query:
    post:
      operationId: queryMaterials
      summary: 查询物料
      description: 根据物料编码、名称、规格、分类或物料类型查询物料。
      security:
        - AgentToolKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialQueryRequest'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialQueryResponse'
        '401':
          description: 工具鉴权失败
components:
  securitySchemes:
    AgentToolKey:
      type: apiKey
      in: header
      name: X-Agent-Tool-Key
  schemas:
    MaterialQueryRequest:
      type: object
      properties:
        keyword:
          type: string
          description: 物料编码、名称或规格关键词
        categoryId:
          type: integer
          format: int64
          description: 物料分类 ID
        materialType:
          type: string
          description: 物料类型
        includeDisabled:
          type: boolean
          default: false
          description: 是否包含停用物料
    MaterialQueryResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        total: { type: integer }
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              code: { type: string }
              name: { type: string }
              type: { type: string }
              categoryId: { type: integer, format: int64, nullable: true }
              categoryName: { type: string, nullable: true }
              spec: { type: string, nullable: true }
              model: { type: string, nullable: true }
              unit: { type: string }
              version: { type: string, nullable: true }
              status: { type: string }
