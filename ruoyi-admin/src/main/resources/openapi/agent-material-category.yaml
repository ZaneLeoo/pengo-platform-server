openapi: 3.0.3
info:
  title: RuoYi Agent - 物料分类查询工具
  version: 1.0.0
  description: 查询 MES 物料分类，只读工具。
servers:
  - url: http://host.docker.internal:8088
paths:
  /agent/tools/material-categories/query:
    post:
      operationId: queryMaterialCategories
      summary: 查询物料分类
      description: 根据分类编码或名称查询物料分类。keyword 为空时返回全部启用分类。
      security:
        - AgentToolKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryQueryRequest'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryQueryResponse'
        '401':
          description: 工具鉴权失败
components:
  securitySchemes:
    AgentToolKey:
      type: apiKey
      in: header
      name: X-Agent-Tool-Key
  schemas:
    CategoryQueryRequest:
      type: object
      properties:
        keyword:
          type: string
          description: 分类编码或分类名称，留空查询全部
        parentId:
          type: integer
          format: int64
          description: 父分类 ID
        includeDisabled:
          type: boolean
          default: false
          description: 是否包含停用分类
    CategoryQueryResponse:
      type: object
      required: [status, resultCode, message, nextAction, retryable, agentInstruction, issues, data]
      properties:
        status: { type: string, enum: [SUCCESS, NO_RESULT, FAILED] }
        resultCode: { type: string, enum: [MATERIAL_CATEGORY_QUERY_SUCCESS, MATERIAL_CATEGORY_NOT_FOUND, TOOL_UNAUTHORIZED] }
        message: { type: string }
        nextAction: { type: string, enum: [CONTINUE, ASK_USER, STOP] }
        retryable: { type: boolean }
        agentInstruction: { type: string }
        issues: { type: array, items: { type: object } }
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              code: { type: string }
              name: { type: string }
              parentId: { type: integer, format: int64, nullable: true }
              ancestors: { type: string, nullable: true }
              level: { type: integer }
              status: { type: string }
        meta:
          type: object
          nullable: true
          properties:
            total: { type: integer, format: int64 }
            truncated: { type: boolean }
