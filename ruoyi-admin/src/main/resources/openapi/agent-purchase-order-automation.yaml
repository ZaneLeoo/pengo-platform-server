openapi: 3.0.3
info:
  title: RuoYi Agent - 采购订单草稿准备工具
  version: 1.0.0
  description: |
    用于 AI 协助建立采购订单的只读准备工具。
    此工具只会匹配启用的供应商和物料、校验输入并计算金额，绝不会创建、审核或修改采购订单。
    当 status 为 READY 时，前端会向用户展示标准化草稿并请求确认；创建动作由登录用户在 RuoYi 前端完成。
servers:
  - url: http://host.docker.internal:8088
paths:
  /agent/tools/purchase-orders/prepare:
    post:
      operationId: preparePurchaseOrderDraft
      summary: 准备采购订单草稿
      description: |
        用户要求建立采购订单时调用。允许传入不完整信息。
        不得编造供应商、物料、数量、单价或日期；应将用户提供的编码或名称放入对应 keyword 字段。
        必须读取响应顶层 nextAction、issues 和 agentInstruction：
        - ASK_USER：禁止用相同参数重试，向用户追问或要求修正 issues 中的字段；
        - SELECT_CANDIDATE：展示 candidates，等待用户明确选择编码后再调用；
        - SHOW_DRAFT：概述 draft，并等待 agent-ui 的确认按钮；不得自行创建订单。
      security:
        - AgentToolKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderDraftRequest'
            examples:
              complete:
                summary: 信息齐全的采购订单草稿
                value:
                  supplierKeyword: SUP001
                  orderDate: '2026-07-12'
                  expectedDate: '2026-07-20'
                  remark: 生产补料
                  lines:
                    - materialKeyword: PCB-CTRL
                      quantity: 100
                      unitPrice: 25.50
                      plannedDate: '2026-07-20'
              incomplete:
                summary: 信息不完整，供工具返回补问字段
                value:
                  supplierKeyword: 鸿发电子
                  lines:
                    - materialKeyword: PCB控制板
      responses:
        '200':
          description: 工具已执行；请根据 data.status 继续对话。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderPreparationResponse'
        '401':
          description: X-Agent-Tool-Key 缺失或无效。
components:
  securitySchemes:
    AgentToolKey:
      type: apiKey
      in: header
      name: X-Agent-Tool-Key
      description: 仅在 Dify 服务端配置的工具密钥，不能暴露给浏览器或用户。
  schemas:
    PurchaseOrderDraftRequest:
      type: object
      required: [supplierKeyword, lines]
      properties:
        supplierKeyword:
          type: string
          description: 供应商编码或名称；不得自行猜测。
        orderDate:
          type: string
          format: date
          description: 订单日期，yyyy-MM-dd；可选。不传时后端默认使用当前日期，不要为此向用户追问。
        expectedDate:
          type: string
          format: date
          description: 预计到货日期，yyyy-MM-dd，可选。
        remark:
          type: string
          maxLength: 500
          description: 订单备注，可选。
        lines:
          type: array
          description: 至少一项采购明细。
          items:
            $ref: '#/components/schemas/PurchaseOrderDraftLineRequest'
    PurchaseOrderDraftLineRequest:
      type: object
      required: [materialKeyword, quantity, unitPrice]
      properties:
        materialKeyword:
          type: string
          description: 物料编码或名称；不得自行猜测。
        quantity:
          type: number
          minimum: 0.000001
          description: 采购数量，必须大于零。
        unitPrice:
          type: number
          minimum: 0
          description: 含税单价，必须大于等于零。字段名必须严格为 unitPrice；不要传中文字段名、taxPrice、price 或其他替代名称。
        plannedDate:
          type: string
          format: date
          description: 该行计划到货日期，可选。
    PreparationStatus:
      type: string
      enum: [NEED_INPUT, AMBIGUOUS, INVALID, READY]
    CandidateOption:
      type: object
      properties:
        id: { type: integer, format: int64, description: 主数据ID，仅用于展示，不可作为创建时的信任依据。 }
        code: { type: string, description: 主数据编码 }
        name: { type: string, description: 主数据名称 }
        spec: { type: string, nullable: true, description: 物料规格 }
        model: { type: string, nullable: true, description: 物料型号 }
        unit: { type: string, nullable: true, description: 物料单位 }
    Candidate:
      type: object
      properties:
        field: { type: string, enum: [supplier, material], description: 需要消歧的字段 }
        keyword: { type: string, description: 原始匹配关键词 }
        options:
          type: array
          items: { $ref: '#/components/schemas/CandidateOption' }
    PurchaseOrderDraftLine:
      type: object
      properties:
        lineNo: { type: integer, description: 行号 }
        materialId: { type: integer, format: int64, description: 后端解析的物料ID }
        materialCode: { type: string }
        materialName: { type: string }
        spec: { type: string, nullable: true }
        model: { type: string, nullable: true }
        unit: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        taxRate: { type: number, description: 由供应商档案带出 }
        amount: { type: number, description: 后端计算的行金额 }
        plannedDate: { type: string, format: date, nullable: true }
    PurchaseOrderDraft:
      type: object
      properties:
        supplierCode: { type: string }
        supplierName: { type: string }
        currency: { type: string }
        orderDate: { type: string, format: date }
        expectedDate: { type: string, format: date, nullable: true }
        remark: { type: string, nullable: true }
        totalQuantity: { type: number }
        totalAmount: { type: number }
        lines:
          type: array
          items: { $ref: '#/components/schemas/PurchaseOrderDraftLine' }
    PreparationResult:
      type: object
      required: [status, message, missingFields, candidates]
      properties:
        status: { $ref: '#/components/schemas/PreparationStatus' }
        message: { type: string }
        missingFields:
          type: array
          items: { type: string }
        candidates:
          type: array
          items: { $ref: '#/components/schemas/Candidate' }
        draft:
          allOf:
            - $ref: '#/components/schemas/PurchaseOrderDraft'
          nullable: true
    ToolIssue:
      type: object
      required: [code, field, message]
      properties:
        code:
          type: string
          description: 稳定的问题编码，例如 MISSING_REQUIRED_FIELD。
        field:
          type: string
          description: 下一次调用必须使用的 Java 实体字段路径，例如 lines[0].unitPrice。
        message:
          type: string
          description: 面向 Agent 的明确修正说明。
    PurchaseOrderPreparationResponse:
      type: object
      required: [success, status, resultCode, nextAction, retryTool, agentInstruction, issues, message, data]
      properties:
        success: { type: boolean, example: true }
        status: { $ref: '#/components/schemas/PreparationStatus' }
        resultCode:
          type: string
          enum: [MISSING_REQUIRED_FIELDS, AMBIGUOUS_MASTER_DATA, BUSINESS_VALIDATION_FAILED, DRAFT_READY]
        nextAction:
          type: string
          enum: [ASK_USER, SELECT_CANDIDATE, SHOW_DRAFT]
          description: Agent 必须执行的下一步动作。
        retryTool:
          type: boolean
          description: 当前参数是否允许立即重试；当前版本非 READY 情况均为 false。
        agentInstruction:
          type: string
          description: Agent 必须遵循的执行指令。
        issues:
          type: array
          items: { $ref: '#/components/schemas/ToolIssue' }
        message: { type: string }
        data: { $ref: '#/components/schemas/PreparationResult' }
